<div class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center p-4">

  <div
      class="w-full max-w-md bg-white dark:bg-slate-900 shadow-xl rounded-xl overflow-hidden border border-primary/10">

      <header class="flex items-center justify-between px-6 py-4 border-b border-primary/10">
          <div class="flex items-center gap-3">
              <div class="bg-primary/10 p-2 rounded-lg">
                  <span class="material-symbols-outlined text-primary text-xl">
                      support_agent
                  </span>
              </div>
              <h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold tracking-tight">Soporte</h2>
          </div>
          <button (click)="closeChat()" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors p-1">
              <span class="material-symbols-outlined" data-icon="close">
                  close
              </span>
          </button>
      </header>

      <div class="p-8">
          <div class="text-center mb-8">
              <h1 class="text-slate-900 dark:text-slate-100 text-2xl font-bold leading-tight">Iniciar Chat de Soporte</h1>
              <p class="text-slate-500 dark:text-slate-400 mt-2 text-sm">Estamos aquí para ayudarte. Por favor ingresa tus datos
                  a continuación.</p>
          </div>
          <form class="space-y-5">
              <!-- Name Input -->
              <div class="flex flex-col gap-2">
                  <label class="text-slate-700 dark:text-slate-300 text-sm font-semibold px-1">Nombre Completo</label>
                  <div class="flex items-center gap-3 px-4 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus-within:ring-2 focus-within:ring-primary/20 focus-within:border-primary transition-all">
                      <span class="material-symbols-outlined text-slate-400 text-xl">person</span>
                      <input
                        [value]="userName()"
                        (input)="userName.set($any($event.target).value)"
                          class="w-full py-3.5 bg-transparent text-slate-900 dark:text-slate-100 outline-none border-none focus:ring-0"
                          placeholder="Ingresa tu nombre completo" type="text" />
                  </div>
              </div>
              <!-- Email Input -->
              <div class="flex flex-col gap-2">
                  <label class="text-slate-700 dark:text-slate-300 text-sm font-semibold px-1">Correo electrónico</label>
                  <div class="flex items-center gap-3 px-4 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus-within:ring-2 focus-within:ring-primary/20 focus-within:border-primary transition-all">
                      <span class="material-symbols-outlined text-slate-400 text-xl">mail</span>
                      <input
                        [value]="email()"
                        (input)="email.set($any($event.target).value)"
                          class="w-full py-3.5 bg-transparent text-slate-900 dark:text-slate-100 outline-none border-none focus:ring-0"
                          placeholder="Ingresa tu correo electrónico" type="email" />
                  </div>
              </div>

              <div class="pt-4">
                  <button
                    (click)="startChat()"
                    [disabled]="!userName() || !email()"
                      class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-lg shadow-lg shadow-primary/20 flex items-center justify-center gap-2 transition-transform active:scale-[0.98] disabled:bg-slate-300 disabled:text-slate-500 disabled:shadow-none disabled:cursor-not-allowed disabled:transform-none"
                      type="button">
                      <span>Iniciar Chat</span>
                      <span class="material-symbols-outlined text-lg">
                          send
                      </span>
                  </button>
              </div>
          </form>

          <div class="mt-8 text-center">
              <p class="text-slate-400 text-xs">
                  Tiempo promedio de respuesta: &lt; 2 minutos
              </p>
          </div>
      </div>
      <!-- Decorative Bottom Bar -->
      <div class="h-1.5 w-full bg-gradient-to-r from-primary/40 via-primary to-primary/40"></div>
  </div>

  <div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
      <div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-3xl"></div>
      <div class="absolute -bottom-[10%] -right-[10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-3xl"></div>
  </div>
</div>
